name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: sinapsi-converter-windows.exe
            pyinstaller_name: sinapsi-converter.exe
          - os: ubuntu-latest
            artifact: sinapsi-converter-linux
            pyinstaller_name: sinapsi-converter

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build binary
        shell: bash
        run: |
          OPTS="--onefile --paths src --name sinapsi-converter"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            OPTS="$OPTS --noconsole"
          fi
          pyinstaller $OPTS scripts/pyinstaller_entry.py

      - name: Rename artifact
        shell: bash
        run: mv "dist/${{ matrix.pyinstaller_name }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if pre-release
        id: prerelease
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts with tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          mv artifacts/sinapsi-converter-windows.exe/sinapsi-converter-windows.exe \
             artifacts/sinapsi-converter-windows-${TAG}.exe
          mv artifacts/sinapsi-converter-linux/sinapsi-converter-linux \
             artifacts/sinapsi-converter-linux-${TAG}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: |
            artifacts/sinapsi-converter-windows-${{ github.ref_name }}.exe
            artifacts/sinapsi-converter-linux-${{ github.ref_name }}

      - name: Clean up old release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PRERELEASE: ${{ steps.prerelease.outputs.is_prerelease }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          # Delete assets from older releases based on release type:
          #   RC release  → strip assets from all OTHER pre-releases
          #   Stable      → strip assets from ALL pre-releases
          #                + keep only the 3 newest stable releases with assets

          delete_assets_for_release() {
            local tag="$1"
            local assets
            assets=$(gh release view "$tag" --json assets --jq '.assets[].name' 2>/dev/null) || return 0
            if [[ -n "$assets" ]]; then
              for asset in $assets; do
                echo "  Deleting asset: $asset from $tag"
                gh release delete-asset "$tag" "$asset" --yes
              done
            fi
          }

          # Get all releases as JSON
          releases=$(gh release list --limit 100 --json tagName,isPrerelease)

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            # RC release: delete assets from all other pre-releases
            echo "RC release ($CURRENT_TAG): cleaning older pre-release assets..."
            echo "$releases" | jq -r '.[] | select(.isPrerelease == true) | .tagName' | while read -r tag; do
              if [[ "$tag" != "$CURRENT_TAG" ]]; then
                delete_assets_for_release "$tag"
              fi
            done
          else
            # Stable release: delete ALL pre-release assets
            echo "Stable release ($CURRENT_TAG): cleaning all pre-release assets..."
            echo "$releases" | jq -r '.[] | select(.isPrerelease == true) | .tagName' | while read -r tag; do
              delete_assets_for_release "$tag"
            done

            # Keep only 3 newest stable releases with assets
            echo "Keeping only 3 newest stable releases with assets..."
            echo "$releases" | jq -r '.[] | select(.isPrerelease == false) | .tagName' | tail -n +4 | while read -r tag; do
              delete_assets_for_release "$tag"
            done
          fi

          echo "Cleanup complete."
